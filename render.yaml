services:
  - type: web
    name: ai-dietitian-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: VECTOR_STORE_TYPE
        value: faiss
      - key: VECTOR_STORE_PATH
        value: ./backend/rag/vector_store
      - key: PDF_PATH
        value: ./data/Dietary_Guidelines_ICMR_NIN.pdf
      - key: CHUNK_SIZE
        value: "512"
      - key: CHUNK_OVERLAP
        value: "64"
      - key: TOP_K_RETRIEVAL
        value: "5"
      - key: LLM_TIMEOUT_SECONDS
        value: "120"
      - key: LLM_MAX_RETRIES
        value: "3"